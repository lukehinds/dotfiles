palette = "muted"

format = """
$directory\
$git_branch\
$git_status\
${custom.worktree}\
$python\
$golang\
$rust\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncation_symbol = "~/"
format = "[$path]($style) "
style = "fg:text"

[git_branch]
symbol = ""
format = "[ $symbol $branch(:$remote_branch) ]($style)"
style = "fg:branchfg bg:branchbg"

[git_status]
format = "[ $conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind]($style)"
conflicted = "=${count} "
stashed = "*${count} "
deleted = "x${count} "
renamed = "r${count} "
modified = "~${count} "
staged = "+${count} "
untracked = "?${count} "
ahead = "up${count} "
behind = "dn${count} "
diverged = "up${ahead_count} dn${behind_count} "
style = "fg:statusfg bg:statusbg"

[custom.worktree]
command = "git rev-parse --show-toplevel 2>/dev/null | xargs basename"
when = "git rev-parse --is-inside-work-tree 2>/dev/null && [ \"$(git worktree list 2>/dev/null | wc -l)\" -gt 1 ]"
format = "[ wt:$output ]($style)"
style = "fg:wtfg bg:wtbg"
shell = ["bash", "--noprofile", "--norc", "-c"]

[character]
success_symbol = "[>](fg:promptok)"
error_symbol = "[>](fg:prompterr)"

[cmd_duration]
min_time = 2000
format = " [$duration]($style) "
style = "fg:dim"

[python]
symbol = ""
format = " [$symbol $version]($style) "
style = "fg:dim"

[golang]
symbol = ""
format = " [$symbol $version]($style) "
style = "fg:dim"

[rust]
symbol = ""
format = " [$symbol $version]($style) "
style = "fg:dim"

[nodejs]
symbol = ""
format = " [$symbol $version]($style) "
style = "fg:dim"

[palettes.muted]
text = "#c0c0b0"
dim = "#706b63"
branchfg = "#b0c4a8"
branchbg = "#2b3328"
statusfg = "#c4a8a8"
statusbg = "#332828"
wtfg = "#a8b8c4"
wtbg = "#282d33"
promptok = "#7a9970"
prompterr = "#997070"
