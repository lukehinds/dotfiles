source-file ~/.config/tmux/tmux.reset.conf

set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set-option -g default-shell '/bin/zsh'
set-option -g default-command '/bin/zsh -l'

set -g prefix ^A
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi
setw -g automatic-rename on
setw -g automatic-rename-format '#(~/.config/tmux/scripts/window-name.sh "#{pane_current_path}")'
set -g allow-rename off
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=#45475a,bg=default'

# Dim inactive panes, keep active pane full brightness
set -g window-style 'fg=#585b70,bg=default'
set -g window-active-style 'fg=#cdd6f4,bg=default'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

set -g @floax-width '90%'
set -g @floax-height '90%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'


set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Catppuccin v2 config
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
set -g status-left-length 100
set -g status-right-length 100

source-file ~/.config/tmux/plugins/tmux/catppuccin_options_tmux.conf
source-file ~/.config/tmux/plugins/tmux/catppuccin_tmux.conf

# Custom worktree status module
source -F "#{d:current_file}/worktree-status.conf"

# Status line modules (must be after catppuccin.tmux)
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_worktree}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# Per-pane border showing worktree/directory
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=magenta bold] #(~/.config/tmux/scripts/window-name.sh "#{pane_current_path}") ,#[fg=#585b70] #(~/.config/tmux/scripts/window-name.sh "#{pane_current_path}") }'

if-shell '[ -f ~/.config/tmux/local.conf ]' 'source-file ~/.config/tmux/local.conf'

run '~/.config/tmux/plugins/tpm/tpm'
